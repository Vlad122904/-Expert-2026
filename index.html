<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>СТО Expert 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="container">
        <div class="logo">EXPERT 2026</div>
    </div>
</div>

<header class="hero">
    <div class="container">
        <h1>СТО Expert 2026</h1>
        <p>Сучасне онлайн бронювання автосервісу</p>
        <button class="btn" id="open">Забронювати</button>
    </div>
</header>

<section class="section">
    <div class="container">
        <div class="section-title">Послуги</div>
        <div class="grid" id="services"></div>
    </div>
</section>

<section class="section booking">
    <div class="container booking-grid">

        <div>
            <h3>Вибрана послуга</h3>
            <div class="highlight" id="selected">—</div>

            <input type="date">
        </div>

        <div>
            <h3>Час</h3>
            <div class="slots" id="slots"></div>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
